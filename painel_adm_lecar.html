  <style>
    :root {
      --blue-900:#1e3a8a;
      --blue-700:#1d4ed8;
      --blue-600:#2563eb;
      --blue-500:#3b82f6;
      --bg:#eef2f7;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#dbe3ef;
      --safe-bottom:env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { min-height:100vh; background:var(--bg); color:var(--text); }
    button, input, textarea, select { font:inherit; }
    button { cursor:pointer; }

    .login-page {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:linear-gradient(135deg,#0d47a1,#2196f3);
    }

    .login-card {
      width:340px;
      max-width:100%;
      padding:30px;
      border-radius:22px;
      background:rgba(255,255,255,.10);
      backdrop-filter:blur(12px);
      box-shadow:0 18px 45px rgba(0,0,0,.28);
      text-align:center;
    }

    .login-logo { width:250px; max-width:92%; filter:drop-shadow(0 8px 18px rgba(0,0,0,.42)); margin-bottom:22px; }
    .login-card h1 { color:#fff; font-size:1.1rem; margin-bottom:16px; text-transform:uppercase; }
    .login-card input {
      width:100%; min-height:46px; margin:6px 0; padding:0 13px; border:1px solid rgba(255,255,255,.24);
      border-radius:12px; outline:none; background:rgba(255,255,255,.14); color:#fff; text-transform:uppercase;
    }
    .login-card input::placeholder { color:rgba(255,255,255,.72); }
    .login-card button { width:100%; min-height:46px; margin-top:10px; border:0; border-radius:12px; background:linear-gradient(90deg,#00c6ff,#0072ff); color:#fff; font-weight:900; text-transform:uppercase; }
    .login-error { display:none; margin-top:12px; color:#fecaca; font-size:.78rem; font-weight:800; }

    .app { display:none; min-height:100vh; padding-bottom:calc(28px + var(--safe-bottom)); }

    .topbar {
      position:fixed; top:0; left:0; right:0; z-index:100;
      min-height:90px; padding:0 24px;
      display:grid; grid-template-columns:auto minmax(220px,560px) auto; align-items:center; gap:20px;
      color:#fff; background:linear-gradient(90deg,#1e3a8a,#2563eb,#3b82f6); background-size:200% 200%;
      animation:gradientMove 6s ease infinite; box-shadow:0 5px 18px rgba(15,23,42,.24);
      border-bottom-left-radius:14px; border-bottom-right-radius:14px;
    }
    @keyframes gradientMove { 0%{background-position:0 50%} 50%{background-position:100% 50%} 100%{background-position:0 50%} }
    .topbar-logo { height:70px; width:auto; max-width:190px; object-fit:contain; filter:drop-shadow(0 5px 12px rgba(0,0,0,.38)); }
    .topbar-search { position:relative; }
    .topbar-search svg { position:absolute; width:21px; height:21px; left:14px; top:50%; transform:translateY(-50%); fill:none; stroke:#64748b; stroke-width:2.2; stroke-linecap:round; }
    .topbar-search input { width:100%; min-height:46px; padding:0 14px 0 44px; border:0; border-radius:14px; outline:none; background:rgba(255,255,255,.94); color:#1e293b; font-size:.88rem; font-weight:850; text-transform:uppercase; box-shadow:0 7px 18px rgba(15,23,42,.12); }
    .topbar-actions { display:flex; align-items:center; gap:10px; }
    .topbar-user { text-align:right; }
    .topbar-user strong { display:block; font-size:.82rem; }
    .topbar-user span { display:block; margin-top:2px; color:#dbeafe; font-size:.62rem; font-weight:800; text-transform:uppercase; }
    .topbar-btn { width:52px; height:52px; border:1px solid rgba(255,255,255,.42); border-radius:15px; background:rgba(255,255,255,.15); color:#fff; display:inline-flex; align-items:center; justify-content:center; }
    .topbar-btn:hover { background:rgba(255,255,255,.25); }
    .topbar-btn svg { width:27px; height:27px; fill:none; stroke:currentColor; stroke-width:2.3; stroke-linecap:round; stroke-linejoin:round; }

    .main { width:min(1120px,calc(100% - 28px)); margin:0 auto; padding-top:116px; }
    .page-head { margin-bottom:16px; }
    .page-head h1 { color:#0f2748; font-size:1.5rem; letter-spacing:-.02em; text-transform:uppercase; }
    .page-head p { margin-top:5px; color:var(--muted); font-size:.84rem; font-weight:650; }

    .stats { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin-bottom:16px; }
    .stat-card { padding:16px; border:1px solid var(--border); border-radius:16px; background:#fff; box-shadow:0 7px 20px rgba(15,23,42,.055); }
    .stat-card span { color:var(--muted); font-size:.68rem; font-weight:900; text-transform:uppercase; }
    .stat-card strong { display:block; margin-top:7px; color:var(--blue-700); font-size:1.8rem; line-height:1; }

    .layout { display:grid; grid-template-columns:380px minmax(0,1fr); gap:16px; align-items:start; }
    .panel { border:1px solid var(--border); border-radius:18px; background:#fff; box-shadow:0 9px 24px rgba(15,23,42,.065); overflow:hidden; }
    .panel-head { padding:16px 18px; border-bottom:1px solid #e2e8f0; background:linear-gradient(90deg,#f8fafc,#eef4ff); }
    .panel-head h2 { color:#0f2748; font-size:.9rem; font-weight:950; text-transform:uppercase; }
    .panel-head p { margin-top:4px; color:var(--muted); font-size:.72rem; font-weight:650; }
    .panel-body { padding:16px; }

    .field { margin-bottom:11px; }
    .field label { display:block; margin-bottom:6px; color:#334155; font-size:.68rem; font-weight:900; text-transform:uppercase; }
    .field input, .field textarea, .field select {
      width:100%; padding:11px 12px; border:1px solid #cbd5e1; border-radius:11px; outline:none; background:#fff; color:#0f172a; text-transform:uppercase;
    }
    .field textarea { min-height:96px; resize:vertical; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.12); }
    .field-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .submit-btn { width:100%; min-height:47px; border:0; border-radius:12px; background:linear-gradient(90deg,#1d4ed8,#2563eb); color:#fff; font-size:.78rem; font-weight:950; text-transform:uppercase; box-shadow:0 8px 18px rgba(37,99,235,.23); }
    .submit-btn:disabled { cursor:not-allowed; opacity:.65; }
    .form-note { margin-top:10px; color:#64748b; font-size:.67rem; font-weight:700; line-height:1.4; text-transform:uppercase; }

    .services-list { display:grid; gap:10px; }
    .service-row { padding:14px; border:1px solid #e2e8f0; border-radius:15px; background:#fff; box-shadow:0 4px 12px rgba(15,23,42,.04); }
    .service-row.assumido { background:#f8fafc; opacity:.82; }
    .service-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .service-plate { color:#0f2748; font-size:1.25rem; font-weight:950; letter-spacing:-.03em; }
    .service-vehicle { margin-top:3px; color:#334155; font-size:.77rem; font-weight:900; text-transform:uppercase; }
    .status-badge { min-height:27px; padding:0 9px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; font-size:.57rem; font-weight:950; text-transform:uppercase; white-space:nowrap; }
    .status-badge.disponivel { background:#dcfce7; border:1px solid #86efac; color:#166534; }
    .status-badge.assumido { background:#e2e8f0; border:1px solid #cbd5e1; color:#475569; }
    .service-desc { margin-top:11px; color:#334155; font-size:.74rem; font-weight:700; line-height:1.45; text-transform:uppercase; }
    .service-meta { display:flex; flex-wrap:wrap; gap:6px; margin-top:11px; }
    .meta-chip { min-height:26px; padding:0 8px; display:inline-flex; align-items:center; border:1px solid #dbeafe; border-radius:8px; background:#eff6ff; color:#1e3a8a; font-size:.57rem; font-weight:900; text-transform:uppercase; }
    .meta-chip.urgent { border-color:#fed7aa; background:#fff7ed; color:#c2410c; }
    .service-actions { display:flex; justify-content:flex-end; margin-top:12px; }
    .cancel-btn { min-height:34px; padding:0 11px; border:1px solid #fecaca; border-radius:10px; background:#fff1f2; color:#dc2626; font-size:.62rem; font-weight:950; text-transform:uppercase; }
    .cancel-btn:disabled { cursor:not-allowed; border-color:#e2e8f0; background:#f1f5f9; color:#94a3b8; }
    .empty { padding:34px 16px; border:1px dashed #cbd5e1; border-radius:15px; color:#64748b; text-align:center; font-size:.75rem; font-weight:800; text-transform:uppercase; }

    .drawer-overlay { display:none; position:fixed; inset:0; z-index:180; background:rgba(15,23,42,.48); }
    .drawer { position:fixed; top:0; right:-340px; z-index:190; width:320px; max-width:88vw; height:100dvh; padding:18px; background:#fff; box-shadow:-18px 0 40px rgba(15,23,42,.25); transition:right .23s ease; }
    body.drawer-open .drawer-overlay { display:block; }
    body.drawer-open .drawer { right:0; }
    .drawer-head { display:flex; align-items:center; justify-content:space-between; padding-bottom:14px; border-bottom:1px solid #e2e8f0; }
    .drawer-head strong { color:#0f2748; text-transform:uppercase; }
    .drawer-close { width:38px; height:38px; border:1px solid #cbd5e1; border-radius:11px; background:#fff; color:#334155; font-size:1.2rem; }
    .drawer-user { margin:14px 0; padding:13px; border:1px solid #dbeafe; border-radius:13px; background:#eff6ff; }
    .drawer-user strong { color:#1e3a8a; font-size:.84rem; }
    .drawer-user span { display:block; margin-top:3px; color:#64748b; font-size:.65rem; font-weight:800; text-transform:uppercase; }
    .drawer-btn { width:100%; min-height:45px; margin-bottom:8px; padding:0 12px; border:1px solid #dbe3ef; border-radius:12px; background:#fff; color:#1e293b; font-size:.72rem; font-weight:900; text-align:left; text-transform:uppercase; }
    .drawer-btn.danger { border-color:#fecdd3; background:#fff1f2; color:#dc2626; }

    .toast { position:fixed; left:50%; bottom:calc(18px + var(--safe-bottom)); z-index:300; transform:translate(-50%,30px); padding:12px 15px; border-radius:12px; background:#0f172a; color:#fff; font-size:.72rem; font-weight:850; opacity:0; pointer-events:none; transition:.2s; text-transform:uppercase; box-shadow:0 10px 28px rgba(15,23,42,.28); }
    .toast.show { opacity:1; transform:translate(-50%,0); }

    @media (max-width:850px) {
      .topbar { grid-template-columns:auto 1fr auto; padding:0 14px; gap:10px; }
      .topbar-user { display:none; }
      .layout { grid-template-columns:1fr; }
      .form-panel { order:1; }
      .list-panel { order:2; }
    }

    @media (max-width:600px) {
      .topbar { min-height:90px; grid-template-columns:auto 1fr auto; }
      .topbar-logo { height:66px; max-width:140px; }
      .topbar-search input { min-height:42px; font-size:.68rem; padding-left:38px; }
      .topbar-search svg { left:11px; width:19px; height:19px; }
      .topbar-btn { width:48px; height:48px; }
      .main { width:calc(100% - 18px); padding-top:108px; }
      .page-head h1 { font-size:1.12rem; }
      .page-head p { font-size:.72rem; }
      .stats { gap:7px; }
      .stat-card { padding:12px 10px; }
      .stat-card span { font-size:.55rem; }
      .stat-card strong { font-size:1.45rem; }
      .field-grid { grid-template-columns:1fr; gap:0; }
      .service-top { align-items:center; }
      .service-plate { font-size:1.08rem; }
    }
  </style>

  <div id="toast" class="toast"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDjMGX595VvyAj6Nk-I4Pj4VGlipJNovPw",
      authDomain: "lehub-lecar.firebaseapp.com",
      projectId: "lehub-lecar",
      storageBucket: "lehub-lecar.firebasestorage.app",
      messagingSenderId: "338216307290",
      appId: "1:338216307290:web:bb31d3710098866094e663"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const SENHA_PADRAO_LPA = "oficina26";
    const USUARIOS_LPA = Object.freeze({
      LEANDRO: { senha: SENHA_PADRAO_LPA, perfil: "ADMINISTRADOR" },
      PREPARACAO: { senha: SENHA_PADRAO_LPA, perfil: "OPERADOR" }
    });
    let servicosAdm = [];
    let veiculosAtivosAdm = [];
    let unsubscribeServicos = null;
    let unsubscribeVeiculosAtivos = null;
    let unsubscribeNotificacoesAdm = null;
    let notificacoesAdm = [];
    let publicando = false;
    let visaoPainelAtual = "AGUARDANDO";
    const USUARIOS_BLOQUEADOS = Object.freeze(["JUNINHO", "JUNINHO_DEL", "ARON"]);

    function normalizar(valor) {
      return String(valor || "")
        .toUpperCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function chaveUsuario(valor) {
      return normalizar(valor).replace(/[\s-]+/g, "_");
    }

    function usuarioBloqueado(valor) {
      return USUARIOS_BLOQUEADOS.includes(chaveUsuario(valor));
    }

    function registroBloqueado(item) {
      return [
        item?.mecanicoResponsavel,
        item?.mecanico_responsavel,
        item?.mecanico,
        item?.usuario,
        item?.criadoPor
      ].some(usuarioBloqueado);
    }

    function veiculoEstaAtivo(item) {
      return normalizar(item?.status) !== "VEICULO FINALIZADO";
    }

    function escapar(valor) {
      return String(valor ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/\"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    function usuarioPainelAtual() {
      const usuarioSessao = normalizar(sessionStorage.getItem("sessao_lecar_admin"));
      if (USUARIOS_LPA[usuarioSessao]) return usuarioSessao;

      const usuarioLeCar = normalizar(localStorage.getItem("sessao_lecar"));
      return usuarioLeCar === "LEANDRO" ? "LEANDRO" : "";
    }

    function perfilPainelAtual() {
      const usuario = usuarioPainelAtual();
      return USUARIOS_LPA[usuario]?.perfil || "";
    }

    function acessoAdminValido() {
      return Boolean(USUARIOS_LPA[usuarioPainelAtual()]);
    }

    function entrarAdmin(event) {
      event.preventDefault();
      const usuario = normalizar(document.getElementById("loginUsuario").value);
      const senha = document.getElementById("loginSenha").value;
      const erro = document.getElementById("loginErro");
      const cadastro = USUARIOS_LPA[usuario];

      if (!cadastro || senha !== cadastro.senha) {
        erro.style.display = "block";
        return;
      }

      sessionStorage.setItem("sessao_lecar_admin", usuario);
      sessionStorage.setItem("perfil_lecar_admin", cadastro.perfil);
      erro.style.display = "none";
      abrirAplicacao();
    }

    function verificarAcesso() {
      if (acessoAdminValido()) abrirAplicacao();
    }

    function aplicarPermissoesInterface() {
      const btnVoltar = document.getElementById("btnVoltarLeCar");
      if (btnVoltar) btnVoltar.style.display = perfilPainelAtual() === "ADMINISTRADOR" ? "block" : "none";
    }

    function abrirAplicacao() {
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("app").style.display = "block";
      aplicarPermissoesInterface();
      iniciarServicos();
      iniciarVeiculosAtivos();
      iniciarNotificacoesAdm();
    }

    function sairAdmin() {
      sessionStorage.removeItem("sessao_lecar_admin");
      sessionStorage.removeItem("perfil_lecar_admin");
      if (typeof unsubscribeServicos === "function") unsubscribeServicos();
      if (typeof unsubscribeVeiculosAtivos === "function") unsubscribeVeiculosAtivos();
      if (typeof unsubscribeNotificacoesAdm === "function") unsubscribeNotificacoesAdm();
      location.reload();
    }

    function usuarioNotificacoesAdm() {
      return usuarioPainelAtual();
    }

    function idsNotificacoesLidasAdm() {
      try {
        const ids = JSON.parse(localStorage.getItem(`lecar_notificacoes_lidas_${usuarioNotificacoesAdm()}`) || "[]");
        return Array.isArray(ids) ? ids : [];
      } catch (erro) {
        return [];
      }
    }

    function notificacaoLidaAdm(item) {
      const usuario = usuarioNotificacoesAdm();
      const remotos = Array.isArray(item?.lidosPor) ? item.lidosPor.map(normalizar) : [];
      return remotos.includes(usuario) || idsNotificacoesLidasAdm().includes(item.id);
    }

    function timestampNotificacaoAdm(item) {
      if (item?.criadoEm?.toMillis) return item.criadoEm.toMillis();
      const data = new Date(item?.criadoEmISO || item?.dataCriacao || "");
      return Number.isNaN(data.getTime()) ? 0 : data.getTime();
    }

    function formatarNotificacaoAdm(item) {
      const ms = timestampNotificacaoAdm(item);
      if (!ms) return "AGORA";
      return new Date(ms).toLocaleString("pt-BR", {
        day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit"
      });
    }

    function tipoNotificacaoAdm(item) {
      const tipo = String(item?.tipo || item?.categoria || "").trim().toLowerCase();
      if (["urgente","atualizacao","informativa"].includes(tipo)) return tipo;
      const antiga = String(item?.prioridade || "").trim().toLowerCase();
      if (antiga === "urgente") return "urgente";
      if (antiga === "atencao") return "atualizacao";
      return "informativa";
    }

    function atualizarBadgeNotificacoesAdm() {
      const badge = document.getElementById("notificacaoBadgeAdm");
      if (!badge) return;
      const total = notificacoesAdm.filter(item => item.ativo !== false && !notificacaoLidaAdm(item)).length;
      badge.textContent = total > 99 ? "99+" : String(total);
      badge.classList.toggle("show", total > 0);
    }

    function renderizarNotificacoesAdm() {
      const lista = document.getElementById("listaNotificacoesAdm");
      if (!lista) return;
      const itens = notificacoesAdm.filter(item => item.ativo !== false);
      if (!itens.length) {
        lista.innerHTML = '<div class="notificacoes-adm-empty">NENHUMA NOTIFICAÇÃO PUBLICADA.</div>';
        return;
      }
      lista.innerHTML = itens.map(item => {
        const tipo = tipoNotificacaoAdm(item);
        const rotulo = tipo === "urgente" ? "URGENTE" : tipo === "atualizacao" ? "ATUALIZAÇÃO" : "INFORMATIVA";
        return `<article class="notificacao-adm-item tipo-${tipo}">
          <div class="notificacao-adm-tipo">${escapar(rotulo)}</div>
          <div class="notificacao-adm-item-head">
            <strong>${escapar(item.titulo || "AVISO")}</strong>
            <span>${escapar(formatarNotificacaoAdm(item))}</span>
          </div>
          <p>${escapar(item.mensagem || "")}</p>
        </article>`;
      }).join("");
    }

    async function marcarNotificacoesAdmComoLidas() {
      const usuario = usuarioNotificacoesAdm();
      const naoLidas = notificacoesAdm.filter(item => item.ativo !== false && !notificacaoLidaAdm(item));
      if (!usuario || !naoLidas.length) return;
      const atuais = new Set(idsNotificacoesLidasAdm());
      naoLidas.forEach(item => atuais.add(item.id));
      localStorage.setItem(`lecar_notificacoes_lidas_${usuario}`, JSON.stringify([...atuais]));
      atualizarBadgeNotificacoesAdm();
      try {
        const lote = db.batch();
        naoLidas.forEach(item => lote.set(db.collection("notificacoes_lecar").doc(item.id), {
          lidosPor: firebase.firestore.FieldValue.arrayUnion(usuario)
        }, { merge:true }));
        await lote.commit();
      } catch (erro) {
        console.warn("Notificações marcadas apenas neste dispositivo:", erro);
      }
    }

    async function abrirNotificacoesPainel() {
      renderizarNotificacoesAdm();
      document.getElementById("modalNotificacoesAdm")?.classList.add("show");
      document.body.style.overflow = "hidden";
      await marcarNotificacoesAdmComoLidas();
    }

    function fecharNotificacoesPainel(event) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById("modalNotificacoesAdm")?.classList.remove("show");
      document.body.style.overflow = "";
    }

    function iniciarNotificacoesAdm() {
      if (typeof unsubscribeNotificacoesAdm === "function") unsubscribeNotificacoesAdm();
      unsubscribeNotificacoesAdm = db.collection("notificacoes_lecar")
        .orderBy("criadoEm", "desc")
        .onSnapshot(snapshot => {
          notificacoesAdm = snapshot.docs
            .map(doc => ({ id:doc.id, ...doc.data() }))
            .filter(item => !registroBloqueado(item))
            .sort((a,b) => timestampNotificacaoAdm(b) - timestampNotificacaoAdm(a));
          atualizarBadgeNotificacoesAdm();
          renderizarNotificacoesAdm();
        }, erro => {
          console.warn("Não foi possível carregar notificações:", erro);
          notificacoesAdm = [];
          atualizarBadgeNotificacoesAdm();
          renderizarNotificacoesAdm();
        });
    }

    function abrirDrawer() { document.body.classList.add("drawer-open"); }
    function fecharDrawer() { document.body.classList.remove("drawer-open"); }
    function voltarLeCar() { window.location.href = "LeCar_integrado_lista_geral.html"; }

    function mostrarToast(texto) {
      const toast = document.getElementById("toast");
      toast.textContent = texto;
      toast.classList.add("show");
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => toast.classList.remove("show"), 2600);
    }

    function timestampServico(item) {
      if (item?.criadoEm?.toMillis) return item.criadoEm.toMillis();
      const data = new Date(item?.criadoEmISO || "");
      return Number.isNaN(data.getTime()) ? 0 : data.getTime();
    }

    function statusDistribuicao(item) {
      return normalizar(item?.statusDistribuicao) === "ASSUMIDO" ? "ASSUMIDO" : "DISPONIVEL";
    }

    const ORDEM_PRIORIDADE = Object.freeze({ NORMAL:1, VENDIDO:2, RETORNO:3, ATRASADO:4, URGENTE:5 });
    const MECANICOS_LECAR = Object.freeze({
      LEANDRO:"LEANDRO",
      ABRAAO:"ABRAÃO",
      PEDRO:"PEDRO",
      MAICON:"MAICON",
      DOUGLAS:"DOUGLAS",
      HARON:"HARON"
    });

    function prioridadeServico(item) {
      const prioridade = normalizar(item?.prioridade || "NORMAL");
      return Object.prototype.hasOwnProperty.call(ORDEM_PRIORIDADE, prioridade) ? prioridade : "NORMAL";
    }

    function classePrioridade(item) {
      return `prioridade-${prioridadeServico(item).toLowerCase()}`;
    }

    function mecanicoCanonico(valor) {
      const chave = chaveUsuario(valor);
      if (!chave || usuarioBloqueado(chave)) return "";
      return MECANICOS_LECAR[chave] || normalizar(valor).replaceAll("_", " ");
    }

    function descricaoEhTrocaOleoLPA(descricao) {
      return normalizar(descricao).includes("TROCA DE OLEO");
    }

    function atualizarAcaoCadastro() {
      const botao = document.getElementById("btnPublicar");
      if (!botao || publicando) return;
      const mecanico = mecanicoCanonico(document.getElementById("admMecanico")?.value || "");
      botao.textContent = mecanico ? `ATRIBUIR PARA ${mecanico}` : "PUBLICAR NA LISTA GERAL";
    }

    function formatarData(item) {
      const ms = timestampServico(item);
      if (!ms) return "DATA NÃO INFORMADA";
      return new Date(ms).toLocaleString("pt-BR", { day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit" });
    }

    function atualizarBarraTarefas() {
      const aguardando = servicosAdm.filter(item => statusDistribuicao(item) === "DISPONIVEL").length;
      const andamento = servicosAdm.filter(item => statusDistribuicao(item) === "ASSUMIDO").length;
      const urgente = servicosAdm.filter(item => prioridadeServico(item) === "URGENTE").length;

      const contadores = {
        countAguardando: aguardando,
        countAndamento: andamento,
        countUrgente: urgente
      };
      Object.entries(contadores).forEach(([id, total]) => {
        const elemento = document.getElementById(id);
        if (elemento) elemento.textContent = total > 99 ? "99+" : String(total);
      });

      const mapaIds = {
        AGUARDANDO:"navAguardando",
        ANDAMENTO:"navAndamento",
        URGENTE:"navUrgente",
        MECANICOS:"navMecanicos"
      };
      Object.values(mapaIds).forEach(id => document.getElementById(id)?.classList.remove("active"));
      document.getElementById(mapaIds[visaoPainelAtual])?.classList.add("active");
    }

    function selecionarVisaoPainel(visao) {
      const permitidas = ["AGUARDANDO","ANDAMENTO","URGENTE","MECANICOS"];
      visaoPainelAtual = permitidas.includes(visao) ? visao : "AGUARDANDO";
      renderizarServicos();
    }

    function iniciaisMecanico(nome) {
      return normalizar(nome).split("_").join(" ").split(" ").filter(Boolean).slice(0,2).map(parte => parte[0]).join("") || "M";
    }

    function classeStatusOperacionalPainel(status) {
      const chave = normalizar(status);
      if (chave === "AGUARDANDO ORCAMENTO") return "status-agendamento";
      if (chave === "AGUARDANDO PECAS") return "status-pecas";
      if (chave === "AGUARDANDO SERVICO") return "status-servico";
      if (chave === "FORNECEDOR" || chave === "ENVIAR PARA TERCEIROS") return "status-fornecedor";
      if (chave === "VEICULO FINALIZADO") return "status-finalizado";
      return "status-servico";
    }

    function rotuloStatusOperacionalPainel(status) {
      const chave = normalizar(status);
      if (chave === "AGUARDANDO ORCAMENTO") return "AGUARDANDO ORÇAMENTO";
      if (chave === "AGUARDANDO PECAS") return "AGUARDANDO PEÇAS";
      if (chave === "AGUARDANDO SERVICO") return "AGUARDANDO SERVIÇO";
      if (chave === "VEICULO FINALIZADO") return "VEÍCULO FINALIZADO";
      if (chave === "ENVIAR PARA TERCEIROS") return "ENVIAR PARA TERCEIROS";
      if (chave === "FORNECEDOR") return "FORNECEDOR";
      return String(status || "ATIVO").toUpperCase().trim();
    }

    function renderizarMecanicos(lista, busca) {
      const mecanicosBase = Object.values(MECANICOS_LECAR).filter(nome => !usuarioBloqueado(nome));
      const mecanicosComVeiculos = veiculosAtivosAdm
        .map(item => mecanicoCanonico(item.mecanico_responsavel || item.mecanicoResponsavel || item.mecanico))
        .filter(Boolean);
      const mecanicos = [...new Set([...mecanicosBase, ...mecanicosComVeiculos])]
        .sort((a,b) => a.localeCompare(b, "pt-BR"));

      const veiculosDoMecanico = nome => veiculosAtivosAdm
        .filter(item => mecanicoCanonico(item.mecanico_responsavel || item.mecanicoResponsavel || item.mecanico) === nome)
        .sort((a,b) => {
          const pa = ORDEM_PRIORIDADE[prioridadeServico(a)] || 1;
          const pb = ORDEM_PRIORIDADE[prioridadeServico(b)] || 1;
          return pb - pa || timestampServico(b) - timestampServico(a);
        });

      const filtrados = mecanicos.filter(nome => {
        const veiculos = veiculosDoMecanico(nome);
        const texto = normalizar([nome, ...veiculos.map(item => `${item.veiculo} ${item.placa} ${item.descricao} ${item.status}`)].join(" "));
        return !busca || texto.includes(busca);
      });

      const totalAtivos = filtrados.reduce((total, nome) => total + veiculosDoMecanico(nome).length, 0);
      document.getElementById("tituloVisaoPainel").textContent = "MECÂNICOS";
      document.getElementById("textoResumoVisao").textContent = "VEÍCULOS ATIVOS";
      document.getElementById("totalVisaoPainel").textContent = String(totalAtivos);

      if (!filtrados.length) {
        lista.innerHTML = '<div class="empty">NENHUM MECÂNICO ENCONTRADO.</div>';
        return;
      }

      lista.innerHTML = `<div class="mechanics-grid">${filtrados.map(nome => {
        const veiculos = veiculosDoMecanico(nome);
        const urgentes = veiculos.filter(item => prioridadeServico(item) === "URGENTE").length;
        const linhas = veiculos.map(item => {
          const prioridade = prioridadeServico(item);
          const status = item.status || "ATIVO";
          const classeStatus = classeStatusOperacionalPainel(status);
          const rotuloStatus = rotuloStatusOperacionalPainel(status);
          return `<div class="mechanic-vehicle-row ${prioridade === "URGENTE" ? "urgente" : ""}" title="${escapar(item.descricao || "")}">
            <span class="mechanic-vehicle-plate">${escapar(item.placa || "-")}</span>
            <span class="mechanic-vehicle-name">${escapar(item.veiculo || "VEÍCULO")}</span>
            <span class="mechanic-vehicle-status ${classeStatus}">${escapar(rotuloStatus)}</span>
          </div>`;
        }).join("");

        return `<article class="mechanic-card">
          <div class="mechanic-avatar">${escapar(iniciaisMecanico(nome))}</div>
          <div class="mechanic-name">${escapar(nome.replaceAll("_"," "))}</div>
          <div class="mechanic-total">${urgentes ? `${urgentes} URGENTE${urgentes > 1 ? "S" : ""}` : "SEM URGÊNCIA"}</div>
          <div class="mechanic-number" title="VEÍCULOS ATIVOS">${veiculos.length}</div>
          <div class="mechanic-services">${linhas || '<span class="mechanic-empty">SEM VEÍCULOS ATIVOS</span>'}</div>
        </article>`;
      }).join("")}</div>`;
    }

    function renderizarServicos() {
      const lista = document.getElementById("listaServicosAdm");
      const busca = normalizar(document.getElementById("buscaAdmin")?.value || "");
      atualizarBarraTarefas();

      if (visaoPainelAtual === "MECANICOS") {
        renderizarMecanicos(lista, busca);
        return;
      }

      const titulos = {
        AGUARDANDO:"AGUARDANDO",
        ANDAMENTO:"EM ANDAMENTO",
        URGENTE:"URGENTES"
      };

      const filtrados = servicosAdm
        .filter(item => !busca || normalizar([item.veiculo,item.placa,item.descricao,item.mecanicoResponsavel,item.origem,item.prioridade].join(" ")).includes(busca))
        .filter(item => {
          if (visaoPainelAtual === "AGUARDANDO") return statusDistribuicao(item) === "DISPONIVEL";
          if (visaoPainelAtual === "ANDAMENTO") return statusDistribuicao(item) === "ASSUMIDO";
          if (visaoPainelAtual === "URGENTE") return prioridadeServico(item) === "URGENTE";
          return true;
        })
        .sort((a,b) => {
          const sa = statusDistribuicao(a) === "ASSUMIDO" ? 1 : 0;
          const sb = statusDistribuicao(b) === "ASSUMIDO" ? 1 : 0;
          const pa = ORDEM_PRIORIDADE[prioridadeServico(a)] || 1;
          const pb = ORDEM_PRIORIDADE[prioridadeServico(b)] || 1;
          return sa - sb || pb - pa || timestampServico(b) - timestampServico(a);
        });

      document.getElementById("tituloVisaoPainel").textContent = titulos[visaoPainelAtual] || "SERVIÇOS";
      document.getElementById("textoResumoVisao").textContent = "SERVIÇOS";
      document.getElementById("totalVisaoPainel").textContent = String(filtrados.length);

      if (!filtrados.length) {
        lista.innerHTML = '<div class="empty">NENHUM SERVIÇO ENCONTRADO.</div>';
        return;
      }

      lista.innerHTML = filtrados.map(item => {
        const assumido = statusDistribuicao(item) === "ASSUMIDO";
        const mecanico = normalizar(item.mecanicoResponsavel || item.mecanico_responsavel || "");
        const prioridade = normalizar(item.prioridade || "NORMAL");
        const origem = normalizar(item.origem || "-");
        const statusTexto = assumido ? `ASSUMIDO • ${escapar(mecanico || "MECÂNICO")}` : "DISPONÍVEL";
        const acaoTexto = assumido ? "BLOQUEADO" : "CANCELAR";

        return `<article class="service-row ${classePrioridade(item)} ${assumido ? "assumido" : ""}">
          <div class="service-card-head">
            <span class="service-date">
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2"></rect><path d="M16 3V7M8 3V7M3 10H21"></path></svg>
              ${escapar(formatarData(item))}
            </span>
            <span class="service-bookmark" title="PRIORIDADE: ${escapar(prioridade)}" aria-label="PRIORIDADE: ${escapar(prioridade)}">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3H18V21L12 17L6 21Z"></path></svg>
            </span>
          </div>

          <div class="service-main">
            <div class="service-plate">${escapar(item.placa || "-")}</div>
            <div class="service-vehicle">${escapar(item.veiculo || "VEÍCULO NÃO INFORMADO")}</div>
          </div>

          <div class="service-desc">${escapar(item.descricao || "SEM DESCRIÇÃO")}</div>

          <div class="service-info">
            <div class="service-info-line service-origin">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9L12 4L20 9V20H4Z"></path><path d="M9 20V13H15V20"></path></svg>
              <span><span class="service-info-label">ORIGEM: </span><strong>${escapar(origem)}</strong></span>
            </div>
            <div class="service-info-line service-priority">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 21V4"></path><path d="M5 5H17L15 9L17 13H5"></path></svg>
              <span><span class="service-info-label">PRIORIDADE: </span><strong>${escapar(prioridade)}</strong></span>
            </div>
          </div>

          <div class="service-footer">
            <span class="status-badge ${assumido ? "assumido" : "disponivel"}">${statusTexto}</span>
            <div class="service-actions">
              <button type="button" class="cancel-btn" ${assumido ? "disabled" : `onclick="cancelarServico('${escapar(item.id)}')"`}>${acaoTexto}</button>
            </div>
          </div>
        </article>`;
      }).join("");
    }

    function iniciarServicos() {
      if (typeof unsubscribeServicos === "function") return;
      unsubscribeServicos = db.collection("servicos_lista_geral")
        .where("ativo","==",true)
        .onSnapshot(snapshot => {
          servicosAdm = snapshot.docs
            .map(doc => ({ id:doc.id, ...doc.data() }))
            .filter(item => !registroBloqueado(item));
          renderizarServicos();
        }, erro => {
          console.error("Erro ao carregar serviços ADM:", erro);
          document.getElementById("listaServicosAdm").innerHTML = '<div class="empty">Erro ao carregar serviços. Verifique a conexão e as permissões do Firebase.</div>';
        });
    }

    function iniciarVeiculosAtivos() {
      if (typeof unsubscribeVeiculosAtivos === "function") return;
      unsubscribeVeiculosAtivos = db.collection("veiculos")
        .where("status", "!=", "VEÍCULO FINALIZADO")
        .onSnapshot(snapshot => {
          veiculosAtivosAdm = snapshot.docs
            .map(doc => ({ id:doc.id, ...doc.data() }))
            .filter(item => veiculoEstaAtivo(item) && !registroBloqueado(item));
          if (visaoPainelAtual === "MECANICOS") renderizarServicos();
        }, erro => {
          console.error("Erro ao carregar veículos ativos:", erro);
          veiculosAtivosAdm = [];
          if (visaoPainelAtual === "MECANICOS") {
            document.getElementById("listaServicosAdm").innerHTML = '<div class="empty">NÃO FOI POSSÍVEL CARREGAR OS VEÍCULOS ATIVOS.</div>';
          }
        });
    }

    function abrirCadastroServico() {
      if (!acessoAdminValido()) return;
      const modal = document.getElementById("modalCadastroServico");
      if (!modal) return;
      modal.classList.add("open");
      document.body.classList.add("cadastro-modal-open");
      window.setTimeout(() => document.getElementById("admVeiculo")?.focus(), 40);
    }

    function fecharCadastroServico(event) {
      const modal = document.getElementById("modalCadastroServico");
      if (!modal) return;
      if (event && event.target !== modal) return;
      modal.classList.remove("open");
      document.body.classList.remove("cadastro-modal-open");
    }

    function focoEmCampoEditavel(elemento) {
      if (!elemento) return false;
      const tag = String(elemento.tagName || "").toUpperCase();
      return elemento.isContentEditable || ["INPUT", "TEXTAREA", "SELECT"].includes(tag);
    }

    async function publicarServico(event) {
      event.preventDefault();
      if (publicando || !acessoAdminValido()) return;

      const veiculo = normalizar(document.getElementById("admVeiculo").value);
      const placa = normalizar(document.getElementById("admPlaca").value).replace(/[^A-Z0-9]/g,"");
      const descricao = normalizar(document.getElementById("admDescricao").value);
      const origem = normalizar(document.getElementById("admOrigem").value || "-");
      const prioridade = prioridadeServico({ prioridade:document.getElementById("admPrioridade").value || "NORMAL" });
      const mecanicoAtribuido = mecanicoCanonico(document.getElementById("admMecanico")?.value || "");

      if (usuarioBloqueado(document.getElementById("admMecanico")?.value || "")) {
        alert("USUÁRIO BLOQUEADO PARA ATRIBUIÇÃO.");
        return;
      }

      if (!veiculo || !placa || !descricao) {
        alert("PREENCHA VEÍCULO, PLACA E DESCRIÇÃO.");
        return;
      }

      publicando = true;
      const botao = document.getElementById("btnPublicar");
      botao.disabled = true;
      botao.textContent = mecanicoAtribuido ? "ATRIBUINDO..." : "PUBLICANDO...";
      const agora = new Date();
      const geralRef = db.collection("servicos_lista_geral").doc();
      const veiculoRef = mecanicoAtribuido ? db.collection("veiculos").doc() : null;

      const payloadGeral = {
        veiculo,
        placa,
        descricao,
        origem,
        prioridade,
        statusServico:"AGUARDANDO ORÇAMENTO",
        statusDistribuicao:mecanicoAtribuido ? "ASSUMIDO" : "DISPONIVEL",
        mecanicoResponsavel:mecanicoAtribuido,
        mecanico_responsavel:mecanicoAtribuido,
        ativo:true,
        criadoPor:usuarioPainelAtual(),
        criadoEm:firebase.firestore.FieldValue.serverTimestamp(),
        criadoEmISO:agora.toISOString(),
        ultimaAtualizacao:firebase.firestore.FieldValue.serverTimestamp(),
        ultimaAtualizacaoISO:agora.toISOString()
      };

      if (mecanicoAtribuido && veiculoRef) {
        payloadGeral.assumidoEm = firebase.firestore.FieldValue.serverTimestamp();
        payloadGeral.assumidoEmISO = agora.toISOString();
        payloadGeral.veiculoId = veiculoRef.id;
      }

      try {
        const lote = db.batch();
        lote.set(geralRef, payloadGeral);

        if (mecanicoAtribuido && veiculoRef) {
          lote.set(veiculoRef, {
            veiculo,
            placa,
            descricao,
            trocaOleo:descricaoEhTrocaOleoLPA(descricao),
            kmAtualOleo:"",
            origem,
            prioridade,
            dataEntrada:agora.toLocaleString("pt-BR"),
            dataEntradaISO:agora.toISOString(),
            status:"AGUARDANDO ORÇAMENTO",
            pecas:[],
            mecanico_responsavel:mecanicoAtribuido,
            ultima_modificacao:agora.toLocaleString("pt-BR"),
            ultima_modificacao_iso:agora.toISOString(),
            origem_lista_geral:true,
            lista_geral_id:geralRef.id,
            painel_adm_criado_por:usuarioPainelAtual()
          });
        }

        await lote.commit();
        document.getElementById("formNovoServico").reset();
        document.getElementById("admPrioridade").value = "NORMAL";
        document.getElementById("admMecanico").value = "";
        mostrarToast(mecanicoAtribuido
          ? `SERVIÇO ATRIBUÍDO PARA ${mecanicoAtribuido} E ENVIADO À ABA SERVIÇOS.`
          : "SERVIÇO PUBLICADO NA LISTA GERAL.");
        fecharCadastroServico();
      } catch (erro) {
        console.error("Erro ao publicar ou atribuir serviço:", erro);
        alert(mecanicoAtribuido
          ? "NÃO FOI POSSÍVEL ATRIBUIR O SERVIÇO AO MECÂNICO."
          : "NÃO FOI POSSÍVEL PUBLICAR O SERVIÇO.");
      } finally {
        publicando = false;
        botao.disabled = false;
        atualizarAcaoCadastro();
      }
    }

    async function cancelarServico(id) {
      if (!id || !acessoAdminValido()) return;
      const item = servicosAdm.find(servico => servico.id === id);
      if (!item || statusDistribuicao(item) !== "DISPONIVEL") {
        alert("SERVIÇOS JÁ ASSUMIDOS NÃO PODEM SER CANCELADOS POR ESTE PAINEL.");
        return;
      }
      if (!confirm(`CANCELAR A PUBLICAÇÃO DE ${item.veiculo || "-"} • ${item.placa || "-"}?`)) return;
      try {
        await db.collection("servicos_lista_geral").doc(id).update({
          ativo:false,
          canceladoPor:usuarioPainelAtual(),
          canceladoEm:firebase.firestore.FieldValue.serverTimestamp(),
          canceladoEmISO:new Date().toISOString(),
          ultimaAtualizacao:firebase.firestore.FieldValue.serverTimestamp(),
          ultimaAtualizacaoISO:new Date().toISOString()
        });
        mostrarToast("PUBLICAÇÃO CANCELADA.");
      } catch (erro) {
        console.error("Erro ao cancelar serviço:", erro);
        alert("NÃO FOI POSSÍVEL CANCELAR A PUBLICAÇÃO.");
      }
    }

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        fecharDrawer();
        fecharCadastroServico();
        return;
      }

      const teclaMais = event.key === "+" || event.code === "NumpadAdd";
      if (!teclaMais || event.ctrlKey || event.altKey || event.metaKey || focoEmCampoEditavel(event.target)) return;

      event.preventDefault();
      abrirCadastroServico();
    });

    verificarAcesso();
  </script>
</body>
