<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEHUB - Sistema de Orçamento - Oficina Mecânica</title>
  <style>
    :root {
      --primary: #14532d;
      --primary-dark: #0f3d22;
      --success: #16a34a;
      --danger: #dc2626;
      --dark: #052e16;
      --muted: #4b5563;
      --border: rgba(134, 239, 172, 0.55);
      --bg: #052e16;
      --card: #dcfce7;
      --card-soft: #f0fdf4;
      --card-strong: #bbf7d0;
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      text-transform: uppercase;
      background:
        radial-gradient(circle at 10% 0%, rgba(34,197,94,0.12), transparent 28%),
        radial-gradient(circle at 90% 15%, rgba(21,128,61,0.10), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(187,247,208,0.06), transparent 30%),
        linear-gradient(135deg, #000704 0%, #01140b 35%, #02190f 70%, #000000 100%);
      color: var(--dark);
      padding: 20px;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent 75%);
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      background: transparent;
      padding: 12px 0 24px;
      margin-bottom: 8px;
      text-align: center;
    }

    .logo-topo {
      animation: floatLogo 4s ease-in-out infinite;
      width: min(100%, 520px);
      max-height: 300px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 18px 34px rgba(34, 197, 94, 0.26));
    }

    @keyframes floatLogo {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(240,253,244,0.98), rgba(220,252,231,0.96));
      backdrop-filter: blur(12px);
      padding: 24px;
      border-radius: var(--radius);
      box-shadow:
        0 20px 45px rgba(0, 0, 0, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(187, 247, 208, 0.55);
      margin-bottom: 18px;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(34, 197, 94, 0.55);
      box-shadow:
        0 24px 55px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, #052e16, #16a34a, #bbf7d0);
    }

    .card::after {
      content: "";
      position: absolute;
      right: -70px;
      top: -70px;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: rgba(34,197,94,0.10);
      pointer-events: none;
    }

    .card h2 {
      position: relative;
      z-index: 1;
      margin-bottom: 18px;
      color: var(--dark);
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 9px;
      letter-spacing: 0.02em;
    }

    .card h3 {
      position: relative;
      z-index: 1;
      margin-top: 20px;
      margin-bottom: 12px;
      color: #064e3b;
      font-size: 17px;
      letter-spacing: 0.04em;
    }

    .form-group {
      position: relative;
      z-index: 1;
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 900;
      font-size: 12px;
      color: #065f46;
      letter-spacing: 0.08em;
    }

    input, textarea {
      text-transform: uppercase;
      width: 100%;
      padding: 15px 16px;
      border: 1px solid rgba(22, 101, 52, 0.28);
      border-radius: 16px;
      font-size: 16px;
      color: #052e16;
      background: linear-gradient(180deg, #ffffff, #f0fdf4);
      transition: all 0.25s ease;
      outline: none;
      box-shadow:
        inset 0 1px 2px rgba(0, 0, 0, 0.04),
        0 8px 18px rgba(6, 78, 59, 0.07);
    }

    input::placeholder, textarea::placeholder {
      color: rgba(6, 78, 59, 0.48);
      letter-spacing: 0.02em;
    }

    input:hover, textarea:hover {
      border-color: #22c55e;
      background: #ffffff;
      box-shadow:
        inset 0 1px 2px rgba(0, 0, 0, 0.03),
        0 10px 22px rgba(6, 78, 59, 0.11);
    }

    input:focus, textarea:focus {
      border-color: #15803d;
      background: #ffffff;
      box-shadow:
        0 0 0 4px rgba(34, 197, 94, 0.18),
        0 14px 28px rgba(6, 78, 59, 0.16);
      transform: translateY(-1px);
    }

    textarea {
      min-height: 108px;
      resize: vertical;
      line-height: 1.45;
    }

    button {
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: none;
      padding: 14px 18px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 900;
      transition: all 0.22s ease;
      min-height: 48px;
      position: relative;
      z-index: 1;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, #14532d, #16a34a 55%, #22c55e);
      color: white;
      width: 100%;
      box-shadow: 0 14px 24px rgba(20, 83, 45, 0.24);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #052e16, #15803d 55%, #16a34a);
    }

    .btn-danger {
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      color: var(--danger);
      padding: 10px 12px;
      min-height: auto;
      font-size: 12px;
      box-shadow: none;
    }

    .btn-danger:hover {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .btn-whatsapp {
      background: linear-gradient(135deg, #16a34a, #25d366);
      color: white;
      box-shadow: 0 14px 24px rgba(37, 211, 102, 0.22);
    }

    .btn-whatsapp:hover {
      background: linear-gradient(135deg, #15803d, #1fb85a);
    }

    .btn-pdf {
      background: linear-gradient(135deg, #991b1b, #ef4444);
      color: white;
      box-shadow: 0 14px 24px rgba(239, 68, 68, 0.22);
    }

    .btn-pdf:hover {
      background: linear-gradient(135deg, #7f1d1d, #dc2626);
    }

    .btn-finish {
      background: linear-gradient(135deg, #064e3b, #0f766e, #22c55e);
      color: white;
      box-shadow: 0 14px 24px rgba(15, 118, 110, 0.24);
    }

    .btn-toggle {
      background: linear-gradient(135deg, #052e16, #166534);
      color: white;
      padding: 10px 14px;
      min-height: auto;
      font-size: 12px;
      border-radius: 999px;
    }

    .btn-print {
      background: linear-gradient(135deg, #14532d, #22c55e);
      color: white;
      width: 100%;
      margin-top: 0;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 24px rgba(22, 163, 74, 0.22);
    }

    .saved-card-header {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .saved-list {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 12px;
    }

    .saved-item {
      cursor: pointer;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(220,252,231,0.9));
      border: 1px solid rgba(134, 239, 172, 0.65);
      border-radius: 18px;
      padding: 15px;
      display: grid;
      gap: 6px;
      transition: all 0.22s ease;
      box-shadow: 0 10px 22px rgba(6, 78, 59, 0.08);
    }

    .saved-item strong {
      color: var(--dark);
      font-size: 16px;
    }

    .saved-item:hover {
      transform: translateY(-2px);
      border-color: #16a34a;
      box-shadow: 0 14px 28px rgba(6, 78, 59, 0.16);
    }

    .saved-item span {
      color: #315143;
      font-size: 14px;
      line-height: 1.35;
    }

    .table-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      overflow-x: auto;
      border-radius: 18px;
      border: 1px solid rgba(134, 239, 172, 0.55);
      margin-top: 14px;
      box-shadow: 0 10px 22px rgba(6, 78, 59, 0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: rgba(255,255,255,0.88);
    }

    th, td {
      border-bottom: 1px solid rgba(187, 247, 208, 0.9);
      padding: 13px;
      text-align: left;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    th {
      background: linear-gradient(180deg, #ecfdf5, #dcfce7);
      color: #065f46;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .resumo {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 10px;
    }

    .resumo p {
      font-size: 15px;
      line-height: 1.5;
      color: #315143;
    }

    .resumo strong {
      color: var(--dark);
    }

    .totais {
      position: relative;
      z-index: 1;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.94), rgba(220,252,231,0.92));
      border: 1px solid rgba(134, 239, 172, 0.65);
      border-radius: 20px;
      padding: 18px;
      margin-top: 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 12px 24px rgba(6, 78, 59, 0.08);
    }

    .total {
      font-size: clamp(25px, 5vw, 36px) !important;
      font-weight: 900;
      color: var(--success) !important;
      margin-top: 8px;
      letter-spacing: 0.01em;
    }

    .orcamento-final {
      border: 1px solid rgba(34, 197, 94, 0.35);
    }

    .empty-message {
      color: var(--muted);
      text-align: center;
      padding: 16px;
      font-size: 14px;
    }

    @media (max-width: 850px) {
      body {
        padding: 12px;
      }

      .logo-topo {
        max-height: 145px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 0;
      }

      header {
        padding: 8px 0 16px;
        margin-bottom: 8px;
      }

      .card {
        padding: 20px;
        border-radius: 20px;
        margin-bottom: 14px;
      }
    }

    @media (max-width: 700px) {
      .actions {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 10px;
      }

      .logo-topo {
        max-height: 112px;
      }

      .card h2 {
        font-size: 18px;
      }

      input, textarea, button {
        font-size: 16px;
      }

      .table-wrapper {
        border: none;
        overflow: visible;
        box-shadow: none;
      }

      table.responsive-table,
      table.responsive-table thead,
      table.responsive-table tbody,
      table.responsive-table th,
      table.responsive-table td,
      table.responsive-table tr {
        display: block;
        width: 100%;
      }

      table.responsive-table thead {
        display: none;
      }

      table.responsive-table tr {
        background: linear-gradient(180deg, #ffffff, #f0fdf4);
        border: 1px solid rgba(134, 239, 172, 0.7);
        border-radius: 16px;
        padding: 10px;
        margin-bottom: 10px;
        box-shadow: 0 8px 18px rgba(6, 78, 59, 0.08);
      }

      table.responsive-table td {
        border: none;
        padding: 8px 4px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      table.responsive-table td::before {
        content: attr(data-label);
        font-weight: 900;
        color: #065f46;
        min-width: 80px;
      }

      .btn-danger {
        width: 100%;
        margin-top: 4px;
      }

      table.responsive-table td:last-child {
        display: block;
      }

      table.responsive-table td:last-child::before {
        display: none;
      }
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      body::before {
        display: none;
      }

      .card:not(.orcamento-final), header, .btn-print, .btn-pdf, .btn-whatsapp, .btn-finish {
        display: none;
      }

      .container {
        max-width: 100%;
      }

      .orcamento-final {
        box-shadow: none;
        border: none;
      }

      .table-wrapper {
        overflow: visible;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <img src="https://i.postimg.cc/pLG64mPQ/logo.png" alt="RENE CAR" class="logo-topo" />
    </header>

    <div class="grid">
      <div class="card">
        <h2>👤 Dados do Cliente</h2>

        <div class="form-group">
          <label>Nome do cliente</label>
          <input type="text" id="clienteNome" placeholder="Ex: João Silva" />
        </div>

        <div class="form-group">
          <label>Telefone</label>
          <input type="tel" id="clienteTelefone" placeholder="Ex: (15) 99999-9999" />
        </div>

        <div class="form-group">
          <label>Endereço</label>
          <input type="text" id="clienteEndereco" placeholder="Ex: Rua das Oficinas, 123" />
        </div>
      </div>

      <div class="card">
        <h2>🚗 Dados do Veículo</h2>

        <div class="form-group">
          <label>Carro</label>
          <input type="text" id="carroModelo" placeholder="Ex: Gol 1.0" />
        </div>

        <div class="form-group">
          <label>Placa</label>
          <input type="text" id="carroPlaca" placeholder="Ex: ABC1D23" />
        </div>

        <div class="form-group">
          <label>Ano</label>
          <input type="number" id="carroAno" placeholder="Ex: 2015" />
        </div>
      </div>
    </div>

    <div class="card">
      <h2>🔧 Adicionar Peça</h2>

      <div class="grid">
        <div class="form-group">
          <label>Nome da peça</label>
          <input type="text" id="pecaNome" placeholder="Ex: Pastilha de freio" />
        </div>

        <div class="form-group">
          <label>Preço da peça</label>
          <input type="number" id="pecaPreco" placeholder="Ex: 120" step="0.01" />
        </div>
      </div>

      <button class="btn-primary" onclick="adicionarPeca()">Adicionar Peça</button>

      <div class="table-wrapper">
        <table class="responsive-table">
          <thead>
            <tr>
              <th>Peça</th>
              <th>Preço</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="listaPecas"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>🧰 Mão de Obra</h2>

      <div class="form-group">
        <label>Descrição do serviço</label>
        <textarea id="servicoDescricao" placeholder="Ex: Troca de pastilha de freio e revisão geral"></textarea>
      </div>

      <div class="form-group">
        <label>Valor da mão de obra</label>
        <input type="number" id="maoObra" placeholder="Ex: 150" step="0.01" oninput="atualizarOrcamento()" />
      </div>
    </div>

    <div class="card orcamento-final">
      <h2>📋 Resumo do Orçamento</h2>

      <div class="resumo">
        <p><strong>Cliente:</strong> <span id="resumoCliente">-</span></p>
        <p><strong>Telefone:</strong> <span id="resumoTelefone">-</span></p>
        <p><strong>Endereço:</strong> <span id="resumoEndereco">-</span></p>
        <p><strong>Veículo:</strong> <span id="resumoCarro">-</span></p>
        <p><strong>Placa:</strong> <span id="resumoPlaca">-</span></p>
        <p><strong>Ano:</strong> <span id="resumoAno">-</span></p>
        <p><strong>Serviço:</strong> <span id="resumoServico">-</span></p>
      </div>

      <h3>Peças</h3>
      <div class="table-wrapper">
        <table class="responsive-table">
          <thead>
            <tr>
              <th>Peça</th>
              <th>Preço</th>
            </tr>
          </thead>
          <tbody id="resumoPecas"></tbody>
        </table>
      </div>

      <div class="totais">
        <div class="resumo">
          <p><strong>Total em peças:</strong> R$ <span id="totalPecas">0,00</span></p>
          <p><strong>Mão de obra:</strong> R$ <span id="totalMaoObra">0,00</span></p>
          <p class="total">Total: R$ <span id="totalGeral">0,00</span></p>
        </div>
      </div>

      <div class="actions">
        <button class="btn-finish" onclick="finalizarSalvarServico()">Finalizar e Salvar Serviço</button>

        <button class="btn-whatsapp" onclick="compartilharWhatsApp()">Compartilhar no WhatsApp</button>

        <button class="btn-pdf" onclick="salvarPDF()">Salvar em PDF</button>

        <button class="btn-print" onclick="window.print()">Imprimir Orçamento</button>
      </div>
    </div>

    <div class="card" id="cardServicosSalvos">
      <div class="saved-card-header">
        <h2>🚘 Carros Salvos</h2>
        <button class="btn-toggle" onclick="alternarCardSalvos()" id="btnToggleSalvos">Minimizar</button>
      </div>

      <div id="conteudoSalvos">
        <div class="saved-list" id="listaServicosSalvos"></div>
      </div>
    </div>
  </div>

  <script>
    let pecas = [];
    let servicosSalvos = JSON.parse(localStorage.getItem('servicosSalvosOficina')) || [];
    let cardSalvosMinimizado = false;

    const campos = [
      'clienteNome',
      'clienteTelefone',
      'clienteEndereco',
      'carroModelo',
      'carroPlaca',
      'carroAno',
      'servicoDescricao'
    ];

    campos.forEach(function(id) {
      document.getElementById(id).addEventListener('input', atualizarOrcamento);
    });

    function formatarMoeda(valor) {
      return Number(valor).toLocaleString('pt-BR', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function adicionarPeca() {
      const campoNome = document.getElementById('pecaNome');
      const campoPreco = document.getElementById('pecaPreco');

      const nome = campoNome.value.trim();
      const preco = Number(campoPreco.value.replace(',', '.'));

      if (!nome) {
        alert('Digite o nome da peça.');
        campoNome.focus();
        return;
      }

      if (isNaN(preco) || preco <= 0) {
        alert('Digite um preço válido.');
        campoPreco.focus();
        return;
      }

      pecas.push({
        nome: nome,
        preco: preco
      });

      campoNome.value = '';
      campoPreco.value = '';
      campoNome.focus();

      atualizarOrcamento();
    }

    function removerPeca(index) {
      pecas.splice(index, 1);
      atualizarOrcamento();
    }

    function atualizarListaPecas() {
      const lista = document.getElementById('listaPecas');
      const resumo = document.getElementById('resumoPecas');

      lista.innerHTML = '';
      resumo.innerHTML = '';

      if (pecas.length === 0) {
        lista.innerHTML = '<tr><td colspan="3" class="empty-message">Nenhuma peça adicionada ainda.</td></tr>';
        resumo.innerHTML = '<tr><td colspan="2" class="empty-message">Nenhuma peça adicionada ainda.</td></tr>';
        return;
      }

      pecas.forEach(function(peca, index) {
        lista.innerHTML += `
          <tr>
            <td data-label="Peça">${peca.nome}</td>
            <td data-label="Preço">R$ ${formatarMoeda(peca.preco)}</td>
            <td data-label="Ação"><button class="btn-danger" onclick="removerPeca(${index})">Remover</button></td>
          </tr>
        `;

        resumo.innerHTML += `
          <tr>
            <td data-label="Peça">${peca.nome}</td>
            <td data-label="Preço">R$ ${formatarMoeda(peca.preco)}</td>
          </tr>
        `;
      });
    }

    function finalizarSalvarServico() {
      const cliente = document.getElementById('clienteNome').value.trim();
      const telefone = document.getElementById('clienteTelefone').value.trim();
      const carro = document.getElementById('carroModelo').value.trim();
      const placa = document.getElementById('carroPlaca').value.trim();
      const ano = document.getElementById('carroAno').value.trim();
      const servico = document.getElementById('servicoDescricao').value.trim();
      const maoObra = Number(document.getElementById('maoObra').value) || 0;

      if (!cliente || !carro || !placa) {
        alert('Preencha pelo menos cliente, carro e placa antes de salvar.');
        return;
      }

      const totalPecas = pecas.reduce(function(total, peca) {
        return total + peca.preco;
      }, 0);

      const totalGeral = totalPecas + maoObra;

      const novoServico = {
        id: Date.now(),
        data: new Date().toLocaleDateString('pt-BR'),
        cliente,
        telefone,
        endereco: document.getElementById('clienteEndereco').value.trim(),
        carro,
        placa,
        ano,
        servico: servico || '-',
        pecas: [...pecas],
        maoObra,
        totalGeral
      };

      servicosSalvos.unshift(novoServico);
      localStorage.setItem('servicosSalvosOficina', JSON.stringify(servicosSalvos));

      atualizarServicosSalvos();
      limparFormulario();
      alert('Serviço finalizado e salvo com sucesso!');
    }

    function limparFormulario() {
      document.getElementById('clienteNome').value = '';
      document.getElementById('clienteTelefone').value = '';
      document.getElementById('clienteEndereco').value = '';
      document.getElementById('carroModelo').value = '';
      document.getElementById('carroPlaca').value = '';
      document.getElementById('carroAno').value = '';
      document.getElementById('servicoDescricao').value = '';
      document.getElementById('maoObra').value = '';
      document.getElementById('pecaNome').value = '';
      document.getElementById('pecaPreco').value = '';
      pecas = [];
      atualizarOrcamento();
    }

    function carregarServicoSalvo(id) {
      const item = servicosSalvos.find(function(servico) {
        return servico.id === id;
      });

      if (!item) return;

      document.getElementById('clienteNome').value = item.cliente || '';
      document.getElementById('clienteTelefone').value = item.telefone || '';
      document.getElementById('clienteEndereco').value = item.endereco || '';
      document.getElementById('carroModelo').value = item.carro || '';
      document.getElementById('carroPlaca').value = item.placa || '';
      document.getElementById('carroAno').value = item.ano || '';
      document.getElementById('servicoDescricao').value = item.servico === '-' ? '' : item.servico;
      document.getElementById('maoObra').value = item.maoObra || '';
      pecas = item.pecas ? [...item.pecas] : [];

      atualizarOrcamento();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function alternarCardSalvos() {
      const conteudo = document.getElementById('conteudoSalvos');
      const botao = document.getElementById('btnToggleSalvos');

      cardSalvosMinimizado = !cardSalvosMinimizado;
      conteudo.style.display = cardSalvosMinimizado ? 'none' : 'block';
      botao.textContent = cardSalvosMinimizado ? 'Mostrar' : 'Minimizar';
    }

    function removerServicoSalvo(id) {
      if (!confirm('Deseja remover este serviço salvo?')) return;

      servicosSalvos = servicosSalvos.filter(function(item) {
        return item.id !== id;
      });

      localStorage.setItem('servicosSalvosOficina', JSON.stringify(servicosSalvos));
      atualizarServicosSalvos();
    }

    function atualizarServicosSalvos() {
      const lista = document.getElementById('listaServicosSalvos');
      lista.innerHTML = '';

      if (servicosSalvos.length === 0) {
        lista.innerHTML = '<div class="empty-message">Nenhum carro salvo ainda.</div>';
        return;
      }

      servicosSalvos.forEach(function(item) {
        lista.innerHTML += `
          <div class="saved-item" onclick="carregarServicoSalvo(${item.id})">
            <strong>${item.carro} - ${item.placa}</strong>
            <span>Cliente: ${item.cliente}</span>
            <span>Telefone: ${item.telefone || '-'}</span>
            <span>Ano: ${item.ano || '-'}</span>
            <span>Serviço: ${item.servico}</span>
            <span>Data: ${item.data}</span>
            <span><strong>Total:</strong> R$ ${formatarMoeda(item.totalGeral)}</span>
            <button class="btn-danger" onclick="event.stopPropagation(); removerServicoSalvo(${item.id})">Remover</button>
          </div>
        `;
      });
    }

    function compartilharWhatsApp() {
      const cliente = document.getElementById('clienteNome').value || '-';
      const telefone = document.getElementById('clienteTelefone').value || '-';
      const carro = document.getElementById('carroModelo').value || '-';
      const placa = document.getElementById('carroPlaca').value || '-';
      const servico = document.getElementById('servicoDescricao').value || '-';
      const maoObra = Number(document.getElementById('maoObra').value) || 0;

      const totalPecas = pecas.reduce(function(total, peca) {
        return total + peca.preco;
      }, 0);

      const totalGeral = totalPecas + maoObra;

      let listaPecas = '';

      pecas.forEach(function(peca) {
        listaPecas += `• ${peca.nome} - R$ ${formatarMoeda(peca.preco)}%0A`;
      });

      const mensagem =
        `*ORÇAMENTO OFICINA*%0A%0A` +
        `👤 Cliente: ${cliente}%0A` +
        `📞 Telefone: ${telefone}%0A` +
        `🚗 Veículo: ${carro}%0A` +
        `🔢 Placa: ${placa}%0A%0A` +
        `🛠 Serviço:%0A${servico}%0A%0A` +
        `📦 Peças:%0A${listaPecas}%0A` +
        `💰 Peças: R$ ${formatarMoeda(totalPecas)}%0A` +
        `🔧 Mão de obra: R$ ${formatarMoeda(maoObra)}%0A%0A` +
        `✅ TOTAL: R$ ${formatarMoeda(totalGeral)}`;

      window.open(`https://wa.me/?text=${mensagem}`, '_blank');
    }

    function salvarPDF() {
      window.print();
    }

    function atualizarOrcamento() {
      const clienteNome = document.getElementById('clienteNome').value || '-';
      const clienteTelefone = document.getElementById('clienteTelefone').value || '-';
      const clienteEndereco = document.getElementById('clienteEndereco').value || '-';
      const carroModelo = document.getElementById('carroModelo').value || '-';
      const carroPlaca = document.getElementById('carroPlaca').value || '-';
      const carroAno = document.getElementById('carroAno').value || '-';
      const servicoDescricao = document.getElementById('servicoDescricao').value || '-';
      const maoObra = Number(document.getElementById('maoObra').value) || 0;

      const totalPecas = pecas.reduce(function(total, peca) {
        return total + peca.preco;
      }, 0);

      const totalGeral = totalPecas + maoObra;

      document.getElementById('resumoCliente').textContent = clienteNome;
      document.getElementById('resumoTelefone').textContent = clienteTelefone;
      document.getElementById('resumoEndereco').textContent = clienteEndereco;
      document.getElementById('resumoCarro').textContent = carroModelo;
      document.getElementById('resumoPlaca').textContent = carroPlaca;
      document.getElementById('resumoAno').textContent = carroAno;
      document.getElementById('resumoServico').textContent = servicoDescricao;

      document.getElementById('totalPecas').textContent = formatarMoeda(totalPecas);
      document.getElementById('totalMaoObra').textContent = formatarMoeda(maoObra);
      document.getElementById('totalGeral').textContent = formatarMoeda(totalGeral);

      atualizarListaPecas();
    }

    atualizarOrcamento();
    atualizarServicosSalvos();
  </script>
</body>
</html>
